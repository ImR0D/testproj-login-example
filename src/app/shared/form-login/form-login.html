<div
  class="container"
  #transitionContainer
  [cdkTrapFocus]="true"
>
  <div class="form-container signUp-container">
    <form
      i18n-aria-label="@@container_signUp_form_ariaLabel_registerUser"
      role="form"
      aria-label="Formulário de criação de conta"
      [formGroup]="signUpForm"
      (ngSubmit)="createAccount()"
    >
      <h1
        i18n-aria-details="@@container_signUp_form_heading_ariaDetails_registerUser"
        i18n
        role="heading"
        aria-details="Registrar usuário"
        tabindex="0"
      >
        Registrar usuário
      </h1>
      <input
        i18n-placeholder="@@container_signUp_form_input_placeholder_name"
        i18n
        type="text"
        placeholder="Nome"
        formControlName="name"
      />
      <input
        i18n-placeholder="@@container_signUp_form_input_placeholder_email"
        i18n
        type="email"
        placeholder="E-mail"
        formControlName="email"
      />
      <input
        i18n-placeholder="@@container_signUp_form_input_placeholder_password"
        i18n
        type="password"
        placeholder="Senha"
        formControlName="password"
      />
      <button
        i18n-aria-label="@@container_signUp_form_button_ariaLabel_createAccount"
        i18n
        role="button"
        type="submit"
      >
        Criar conta
      </button>
    </form>
  </div>
  <div class="form-container signIn-container">
    <form
      i18n-aria-label="@@container_signIn_form_ariaLabel_login"
      role="form"
      aria-label="Formulário de acesso"
      [formGroup]="signInForm"
      (ngSubmit)="login()"
    >
      <h1
        i18n-aria-details="@@container_signIn_form_heading_ariaDetails_accessAccount"
        i18n
        role="heading"
        aria-details="Acesse sua conta"
        tabindex="0"
      >
        Acessar
      </h1>
      <input
        i18n-placeholder="@@container_signIn_form_input_placeholder_email"
        i18n
        role="textbox"
        type="email"
        placeholder="E-mail"
        formControlName="email"
      />
      <input
        i18n-placeholder="@@container_signIn_form_input_placeholder_password"
        i18n
        role="textbox"
        type="password"
        placeholder="Senha"
        formControlName="password"
      />
      <a
        i18n-aria-label="@@container_signIn_form_link_ariaLabel_forgotPassword"
        i18n
        role="link"
        aria-label="Esqueci minha senha"
        href="#"
        tabindex="0"
        >Esqueci minha senha</a
      >
      <button
        i18n-aria-label="@@container_signIn_form_button_ariaLabel_accessAccount"
        i18n
        role="button"
        aria-label="Acessar conta"
        type="submit"
      >
        Acessar
      </button>
    </form>
  </div>
  <div
    class="overlay-container"
    cdkTrapFocusAutoCapture
  >
    <div class="overlay">
      <div
        aria-atomic="true"
        aria-relevant="additions text"
        aria-live="polite"
        class="overlay-panel overlay-left"
      >
        <h1
          i18n-aria-details="@@container_overlay_panel_left_heading_ariaDetails_subscribe"
          i18n
          role="heading"
          aria-details="Já possui uma conta?"
          tabindex="0"
        >
          Já possui uma conta?
        </h1>
        <p
          i18n-aria-details="@@container_overlay_panel_left_paragraph_ariaDetails_accessAccount"
          aria-details="Acesse clicando no botão abaixo"
          i18n
          role="text"
          tabindex="0"
        >
          Acesse clicando no botão abaixo
        </p>
        <button
          i18n-aria-label="@@container_overlay_panel_left_button_ariaLabel_accessAccount"
          i18n
          role="button"
          aria-label="Acessar conta"
          (click)="transition()"
          class="ghost"
        >
          Acessar conta
        </button>
      </div>
      <div
        aria-atomic="true"
        aria-relevant="additions text"
        aria-live="polite"
        class="overlay-panel overlay-right"
      >
        <h1
          i18n-aria-details="@@container_overlay_panel_right_heading_ariaDetails_subscribe"
          i18n
          role="heading"
          aria-details="Inscreva-se"
          tabindex="0"
        >
          Inscreva-se
        </h1>
        <p
          i18n-aria-details="@@container_overlay_panel_right_paragraph_ariaDetails_subscribe"
          i18n
          role="text"
          aria-details="Ainda não possui uma conta? Não perca seu tempo, crie uma conta clicando abaixo"
          tabindex="0"
        >
          Ainda não possui uma conta? Não perca seu tempo, crie uma conta clicando abaixo
        </p>
        <button
          i18n-aria-label="@@container_overlay_panel_right_button_ariaLabel_subscribe"
          i18n
          role="button"
          aria-label="Inscrever-se"
          (click)="transition()"
          class="ghost"
        >
          Inscrever-se
        </button>
      </div>
    </div>
  </div>
</div>
