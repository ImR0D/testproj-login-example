<div
  class="container"
  id="container"
  #transitionContainer
>
  <div class="form-container signUp-container">
    <form (ngSubmit)="createAccount()">
      <h1>Create Account</h1>
      <input
        type="text"
        placeholder="Name"
      />
      <input
        type="email"
        placeholder="Email"
      />
      <input
        type="password"
        placeholder="Password"
      />
      <button>Sign Up</button>
    </form>
  </div>
  <div class="form-container signIn-container">
    <form action="#">
      <h1>Sign in</h1>
      <input
        type="email"
        placeholder="Email"
      />
      <input
        type="password"
        placeholder="Password"
      />
      <a href="#">Forgot your password?</a>
      <button>Sign In</button>
    </form>
  </div>
  <div class="overlay-container">
    <div class="overlay">
      <div class="overlay-panel overlay-left">
        <h1>Welcome Back!</h1>
        <p>To keep connected with us please login with your personal info</p>
        <button
          class="ghost"
          id="signIn"
          (click)="transition()"
        >
          Sign In
        </button>
      </div>
      <div class="overlay-panel overlay-right">
        <h1>Hello, Friend!</h1>
        <p>Enter your personal details and start journey with us</p>
        <button
          class="ghost"
          id="signUp"
          (click)="transition()"
        >
          Sign Up
        </button>
      </div>
    </div>
  </div>
</div>
