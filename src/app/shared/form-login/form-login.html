<div
  class="container"
  id="container"
  #transitionContainer
>
  <div
    class="form-container signUp-container"
    tabindex="-1"
  >
    <form (ngSubmit)="createAccount()">
      <h1 i18n>Registrar usuário</h1>
      <input
        type="text"
        placeholder="Nome"
        i18n-placeholder="@@placeholderName_signUp"
      />
      <input
        type="email"
        placeholder="E-mail"
        i18n-placeholder="@@placeholderEmail_signUp"
      />
      <input
        type="password"
        placeholder="Senha"
        i18n-placeholder="@@placeholderPassword_signUp"
      />
      <button i18n>Criar conta</button>
    </form>
  </div>
  <div class="form-container signIn-container">
    <form (ngSubmit)="login()">
      <h1 i18n>Acessar</h1>
      <input
        type="email"
        placeholder="E-mail"
        i18n-placeholder="@@placeholderEmail_signIn"
      />
      <input
        type="password"
        placeholder="Senha"
        i18n-placeholder="@@placeholderPassword_signIn"
      />
      <a
        i18n
        href="#"
        >Esqueci minha senha</a
      >
      <button i18n>Acessar</button>
    </form>
  </div>
  <div class="overlay-container">
    <div class="overlay">
      <div class="overlay-panel overlay-left">
        <h1 i18n>Já possui uma conta?</h1>
        <p i18n>Acesse clicando no botão abaixo</p>
        <button
          class="ghost"
          id="signIn"
          (click)="transition()"
          i18n
        >
          Acessar conta
        </button>
      </div>
      <div class="overlay-panel overlay-right">
        <h1 i18n>Inscreva-se</h1>
        <p i18n>Ainda não possui uma conta? Não perca seu tempo, crie uma conta clicando abaixo</p>
        <button
          class="ghost"
          id="signUp"
          (click)="transition()"
          i18n
        >
          Inscrever-se
        </button>
      </div>
    </div>
  </div>
</div>
